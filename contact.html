<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    function loadAnalytics() {
      if (window.__markodeAnalyticsLoaded) return;
      window.__markodeAnalyticsLoaded = true;
      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://www.googletagmanager.com/gtag/js?id=G-433DS9F84G';
      document.head.appendChild(script);
      gtag('js', new Date());
      gtag('config', 'G-433DS9F84G');
    }
    if ('requestIdleCallback' in window) {
      requestIdleCallback(loadAnalytics, { timeout: 3000 });
    } else {
      window.addEventListener('load', () => setTimeout(loadAnalytics, 1500), { once: true });
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تواصل معنا | Markode</title>
  <link rel="icon" href="logo-64.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="language-switch">
    <button id="ar-btn" class="active">AR</button>
    <button id="en-btn">EN</button>
  </div>

    <nav class="navbar">
    <a href="index.html" id="nav-home">الرئيسية</a>
    <a href="about.html" id="nav-about">من نحن</a>
    <a href="services.html" id="nav-services">خدماتنا</a>
    <a href="plans.html" id="nav-plans">الباقات</a>
    <a href="privacy.html" id="nav-privacy" class="active">سياسة الخصوصية</a>
    <a href="contact.html" id="nav-contact">تواصل معنا</a>
  </nav>

  <section class="hero">
    <div class="hero-box">
      <h1 id="contact-title">
        <strong>تواصل معنا في <span class="highlighted">Markode</span></strong>
      </h1>
      <p id="intro-text">نحن هنا للإجابة على استفساراتك ومساعدتك في تحقيق أهدافك الرقمية.</p>
    </div>
  </section>

  <section class="contact-wrapper">
    <form class="contact-box" action="https://formspree.io/f/xeozlkkv" method="POST" onsubmit="showOrderSuccessMessage(event)">
      <label id="label-name" for="name">الاسم:</label>
      <input type="text" id="name" name="name" required autocomplete="name">

      <label id="label-phone" for="phone">رقم الهاتف:</label>
      <input type="tel" id="phone" name="phone" required placeholder="+xxxxxxxx" autocomplete="tel">

      <label id="label-email" for="email">البريد الإلكتروني:</label>
      <input type="email" id="email" name="email" required autocomplete="email">

      <label id="label-message" for="message">الرسالة:</label>
      <textarea id="message" name="message" rows="5" required autocomplete="off"></textarea>

      <button type="submit" id="submit-btn" class="btn">إرسال</button>
    </form>
  </section>

  <div id="order-success-message"></div>

  <footer>
    <p id="footer-text">جميع الحقوق محفوظة © 2025 Markode</p>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
