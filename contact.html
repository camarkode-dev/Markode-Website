  <section class="hero">
    <div class="hero-box">
      <h1 id="contact-title">
        <strong>تواصل معنا في <span class="highlighted">Markode</span></strong>
      </h1>
      <p id="intro-text">نحن هنا للإجابة على استفساراتك ومساعدتك في تحقيق أهدافك الرقمية.</p>
    </div>

  <section class="contact-wrapper">
    <form id="contactForm" class="contact-box" action="https://formspree.io/f/xeozlkkv" method="POST" onsubmit="showOrderSuccessMessage(event)">
      <input type="hidden" name="_subject" value="New contact request from Markode website">
      <input type="hidden" name="_replyto" value="">
      <input type="hidden" name="source_page" value="contact.html">
      <input type="hidden" name="source_form" value="contact-page">
      <input type="hidden" name="site_name" value="Markode">
      <input type="text" name="_gotcha" class="visually-hidden" tabindex="-1" autocomplete="off" aria-hidden="true">
      <label id="label-name" for="name">الاسم:</label>
      <input type="text" id="name" name="name" required autocomplete="name">

      <label id="label-phone" for="phone">رقم الهاتف:</label>
      <input type="tel" id="phone" name="phone" required placeholder="+xxxxxxxx" autocomplete="tel">

      <label id="label-email" for="email">البريد الإلكتروني:</label>
      <input type="email" id="email" name="email" required autocomplete="email">

      <label id="label-message" for="message">الرسالة:</label>
      <textarea id="message" name="message" rows="5" required autocomplete="off"></textarea>

      <button type="submit" id="submit-btn" class="btn">إرسال</button>
    </form>
  </section>

  <p id="order-success-message" class="order-success" role="status" aria-live="polite"></p>
